<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>io-manager Boss Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #0b1020; color: #e6eaf5; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card { background: #121a33; padding: 12px 16px; border-radius: 10px; min-width: 180px; }
    .muted { color: #98a2c3; font-size: 12px; }
    .danger { color: #ff7b7b; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    td, th { border-bottom: 1px solid #223059; padding: 8px; text-align: left; }
    input, button, select { padding: 8px; margin-right: 8px; margin-bottom: 8px; }
    section { margin-bottom: 20px; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
    .chart-card { background: #121a33; border-radius: 10px; padding: 16px; }
    .chart-card h3 { margin: 0 0 8px 0; font-size: 14px; color: #98a2c3; }
    .chart-container { width: 100%; height: 320px; }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>老板大盘（io-manager）</h1>
  <p class="muted">实时查看项目规划、任务拆解与执行进度</p>

  <div class="row" id="stats"></div>

  <section>
    <h2>数据可视化</h2>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>任务状态分布</h3>
        <div id="chart-status" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>燃尽趋势图</h3>
        <div id="chart-burndown" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>任务依赖关系图</h3>
        <div>
          <select id="graphProjectId" onchange="loadTaskGraph()" style="margin-bottom:8px;">
            <option value="">选择项目...</option>
          </select>
        </div>
        <div id="chart-graph" class="chart-container"></div>
      </div>
      <div class="chart-card">
        <h3>Worker 负载分布</h3>
        <div id="chart-worker" class="chart-container"></div>
      </div>
    </div>
  </section>

  <section>
    <h2>项目</h2>
    <input id="pName" placeholder="项目名称" />
    <input id="pGoal" placeholder="项目目标" size="50" />
    <button onclick="createProject()">创建项目</button>
  </section>

  <section>
    <h2>任务</h2>
    <input id="tProjectId" placeholder="项目ID" size="20" />
    <input id="tTitle" placeholder="任务标题" size="30" />
    <input id="tAssignee" placeholder="执行者（如 zhaoliying）" size="18" />
    <input id="tDepends" placeholder="依赖任务ID(逗号分隔)" size="30" />
    <input id="tTimeout" placeholder="超时分钟(默认60)" size="14" />
    <button onclick="createTask()">创建任务</button>

    <table>
      <thead><tr><th>标题</th><th>负责人</th><th>状态</th><th>依赖</th><th>操作</th></tr></thead>
      <tbody id="tasks"></tbody>
    </table>
  </section>

  <section>
    <h2>风险摘要</h2>
    <p id="riskSummary" style="color:#ff7b7b;font-weight:bold"></p>
    <h3>详细风险</h3>
    <ul id="risks"></ul>
  </section>

  <section>
    <h2>任务模板</h2>
    <ul id="templates"></ul>
  </section>

  <section>
    <h2>Worker 状态</h2>
    <ul id="workers"></ul>
  </section>

  <script>
    const API = (location.hostname === 'localhost' ? 'http://localhost:7100' : location.origin) + '/api/v1';
    const apiKey = localStorage.getItem('io_api_key') || prompt('请输入 x-api-key（老板默认: boss_token_7100）') || '';
    localStorage.setItem('io_api_key', apiKey);

    async function api(path, options = {}) {
      const headers = Object.assign({}, options.headers || {}, { 'x-api-key': apiKey });
      const res = await fetch(API + path, { ...options, headers });
      return res.json();
    }

    // ============ ECharts Setup ============
    const STATUS_COLORS = {
      Triage: '#9b59b6', Backlog: '#3498db', InProgress: '#f39c12',
      Blocked: '#e74c3c', Review: '#1abc9c', Done: '#2ecc71',
    };
    const ALL_STATUSES = ['Triage', 'Backlog', 'InProgress', 'Blocked', 'Review', 'Done'];

    let chartStatus, chartBurndown, chartGraph, chartWorker;

    function initCharts() {
      if (typeof echarts === 'undefined') return;
      chartStatus   = echarts.init(document.getElementById('chart-status'), 'dark');
      chartBurndown = echarts.init(document.getElementById('chart-burndown'), 'dark');
      chartGraph    = echarts.init(document.getElementById('chart-graph'), 'dark');
      chartWorker   = echarts.init(document.getElementById('chart-worker'), 'dark');
      window.addEventListener('resize', () => {
        chartStatus && chartStatus.resize();
        chartBurndown && chartBurndown.resize();
        chartGraph && chartGraph.resize();
        chartWorker && chartWorker.resize();
      });
    }

    // ============ Chart 1: Status Distribution Donut ============
    function renderStatusChart(statusStats) {
      if (!chartStatus) return;
      const data = ALL_STATUSES
        .filter(s => (statusStats[s] || 0) > 0)
        .map(s => ({ name: s, value: statusStats[s] || 0 }));

      if (data.length === 0) {
        chartStatus.clear();
        chartStatus.setOption({ backgroundColor: 'transparent', graphic: { type: 'text', left: 'center', top: 'center', style: { text: '暂无任务', fill: '#98a2c3', fontSize: 14 } } });
        return;
      }

      chartStatus.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: '#98a2c3' } },
        color: data.map(d => STATUS_COLORS[d.name]),
        series: [{
          type: 'pie', radius: ['45%', '70%'], center: ['40%', '50%'],
          avoidLabelOverlap: true,
          itemStyle: { borderRadius: 4, borderColor: '#121a33', borderWidth: 2 },
          label: { show: true, formatter: '{b}\n{c}', color: '#e6eaf5' },
          emphasis: { label: { show: true, fontSize: 16, fontWeight: 'bold' } },
          data: data,
        }],
      });
    }

    // ============ Chart 2: Burndown Trend ============
    async function loadBurndownChart() {
      if (!chartBurndown) return;
      const res = await api('/dashboard/charts/burndown');
      const d = res.data;

      if (!d.dates || d.dates.length === 0) {
        chartBurndown.clear();
        chartBurndown.setOption({ backgroundColor: 'transparent', graphic: { type: 'text', left: 'center', top: 'center', style: { text: '暂无数据', fill: '#98a2c3', fontSize: 14 } } });
        return;
      }

      chartBurndown.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis' },
        legend: { data: ['任务总数', '剩余任务'], textStyle: { color: '#98a2c3' } },
        grid: { left: 50, right: 20, top: 40, bottom: 30 },
        xAxis: {
          type: 'category', data: d.dates,
          axisLabel: { color: '#98a2c3', formatter: v => v.slice(5) },
          axisLine: { lineStyle: { color: '#223059' } },
        },
        yAxis: {
          type: 'value', minInterval: 1,
          axisLabel: { color: '#98a2c3' },
          splitLine: { lineStyle: { color: '#223059' } },
        },
        series: [
          { name: '任务总数', type: 'line', data: d.totalTasks, smooth: true, lineStyle: { width: 2 }, itemStyle: { color: '#3498db' }, areaStyle: { color: 'rgba(52,152,219,0.1)' } },
          { name: '剩余任务', type: 'line', data: d.remainingTasks, smooth: true, lineStyle: { width: 2 }, itemStyle: { color: '#e74c3c' }, areaStyle: { color: 'rgba(231,76,60,0.1)' } },
        ],
      });
    }

    // ============ Chart 3: Task Dependency Graph ============
    async function loadTaskGraph() {
      if (!chartGraph) return;
      const projectId = document.getElementById('graphProjectId').value;
      if (!projectId) {
        chartGraph.clear();
        chartGraph.setOption({ backgroundColor: 'transparent', graphic: { type: 'text', left: 'center', top: 'center', style: { text: '请选择项目', fill: '#98a2c3', fontSize: 14 } } });
        return;
      }

      const res = await api('/dashboard/charts/task-graph?projectId=' + projectId);
      const d = res.data;

      if (!d.nodes || d.nodes.length === 0) {
        chartGraph.clear();
        chartGraph.setOption({ backgroundColor: 'transparent', graphic: { type: 'text', left: 'center', top: 'center', style: { text: '该项目暂无任务', fill: '#98a2c3', fontSize: 14 } } });
        return;
      }

      const nodes = d.nodes.map(n => ({
        id: n.id, name: n.name, symbolSize: 30,
        itemStyle: { color: STATUS_COLORS[n.status] || '#666' },
        label: { show: true, fontSize: 10, color: '#e6eaf5', formatter: n.name.length > 8 ? n.name.slice(0, 8) + '...' : n.name },
        tooltip: { formatter: n.name + '<br/>状态: ' + n.status + '<br/>负责人: ' + n.assignee },
      }));

      const edges = d.edges.map(e => ({
        source: e.source, target: e.target,
        lineStyle: { color: '#4a5568', curveness: 0.2 },
      }));

      chartGraph.setOption({
        backgroundColor: 'transparent',
        tooltip: {},
        series: [{
          type: 'graph', layout: 'force', roam: true, draggable: true,
          force: { repulsion: 200, edgeLength: [80, 160], gravity: 0.1 },
          edgeSymbol: ['none', 'arrow'], edgeSymbolSize: [4, 8],
          data: nodes, links: edges,
          emphasis: { focus: 'adjacency', lineStyle: { width: 3 } },
        }],
      });
    }

    // ============ Chart 4: Worker Load Bar Chart ============
    async function loadWorkerLoadChart() {
      if (!chartWorker) return;
      const res = await api('/dashboard/charts/worker-load');
      const d = res.data;

      if (!d.workers || d.workers.length === 0) {
        chartWorker.clear();
        chartWorker.setOption({ backgroundColor: 'transparent', graphic: { type: 'text', left: 'center', top: 'center', style: { text: '暂无任务分配', fill: '#98a2c3', fontSize: 14 } } });
        return;
      }

      const series = d.series
        .filter(s => s.data.some(v => v > 0))
        .map(s => ({
          name: s.status, type: 'bar', stack: 'total', data: s.data,
          itemStyle: { color: STATUS_COLORS[s.status] },
          emphasis: { focus: 'series' },
        }));

      chartWorker.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: { data: d.statuses.filter(s => d.series.find(ser => ser.status === s && ser.data.some(v => v > 0))), textStyle: { color: '#98a2c3' } },
        grid: { left: 100, right: 20, top: 40, bottom: 20 },
        xAxis: { type: 'value', minInterval: 1, axisLabel: { color: '#98a2c3' }, splitLine: { lineStyle: { color: '#223059' } } },
        yAxis: { type: 'category', data: d.workers, axisLabel: { color: '#98a2c3' }, axisLine: { lineStyle: { color: '#223059' } } },
        series: series,
      });
    }

    // ============ Main Load Function ============
    async function load() {
      const [overview, tasks] = await Promise.all([
        api('/dashboard/overview'),
        api('/tasks')
      ]);

      const data = overview.data;
      const cards = [
        ['项目数', data.projectCount],
        ['任务总数', data.taskCount],
        ['进行中', data.statusStats.InProgress || 0],
        ['阻塞', data.statusStats.Blocked || 0],
        ['已完成', data.statusStats.Done || 0],
        ['风险', data.riskCount || 0]
      ];
      document.getElementById('stats').innerHTML = cards.map(([k,v]) => `<div class="card"><div class="muted">${k}</div><div style="font-size:24px">${v}</div></div>`).join('');

      // Render status donut from existing data
      renderStatusChart(data.statusStats);

      document.getElementById('tasks').innerHTML = tasks.data.map(t => `
        <tr>
          <td>${t.title}</td>
          <td>${t.assignee}</td>
          <td>${t.status}</td>
          <td>${(t.dependsOn || []).join(', ') || '-'}</td>
          <td>
            <select id="s-${t.id}">
              <option>Triage</option><option>Backlog</option><option>InProgress</option><option>Blocked</option><option>Review</option><option>Done</option>
            </select>
            <button onclick="changeStatus('${t.id}')">更新</button>
          </td>
        </tr>
      `).join('');

      document.getElementById('risks').innerHTML = (data.risks || []).map(r => `<li class="danger">[${r.type}] ${r.title} (${r.assignee}) - ${r.note}</li>`).join('') || '<li>暂无风险</li>';
      document.getElementById('riskSummary').textContent = data.riskSummary || '暂无风险';

      // Load templates, workers, and populate project dropdown
      const [templates, workers, projects] = await Promise.all([
        api('/templates'),
        api('/workers'),
        api('/projects')
      ]);
      document.getElementById('templates').innerHTML = (templates.data || []).map(t => `<li>${t.name} (tags: ${t.tags.join(', ')}) - 超时:${t.defaultTimeout}min</li>`).join('') || '<li>无模板</li>';
      document.getElementById('workers').innerHTML = (workers.data || []).map(w => `<li>${w.name} [${w.status}] tags:${w.tags.join(', ')}</li>`).join('') || '<li>无Worker</li>';

      // Update project dropdown for dependency graph
      const select = document.getElementById('graphProjectId');
      const currentVal = select.value;
      select.innerHTML = '<option value="">选择项目...</option>' +
        (projects.data || []).map(p => '<option value="' + p.id + '"' + (p.id === currentVal ? ' selected' : '') + '>' + p.name + '</option>').join('');

      // Load charts in parallel
      await Promise.all([
        loadBurndownChart(),
        loadWorkerLoadChart(),
        currentVal ? loadTaskGraph() : Promise.resolve(),
      ]);
    }

    async function createProject() {
      const name = document.getElementById('pName').value;
      const goal = document.getElementById('pGoal').value;
      await api('/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, goal, owner: 'boss' })
      });
      await load();
    }

    async function createTask() {
      const projectId = document.getElementById('tProjectId').value;
      const title = document.getElementById('tTitle').value;
      const assignee = document.getElementById('tAssignee').value || 'unassigned';
      const dependsRaw = document.getElementById('tDepends').value;
      const timeoutMinutes = Number(document.getElementById('tTimeout').value || 60);
      const dependsOn = dependsRaw ? dependsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

      await api('/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ projectId, title, assignee, dependsOn, timeoutMinutes })
      });
      await load();
    }

    async function changeStatus(taskId) {
      const status = document.getElementById('s-' + taskId).value;
      const result = await api('/tasks/' + taskId + '/status', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (result.code !== 0) alert(result.msg + (result.data ? '\n' + JSON.stringify(result.data) : ''));
      await load();
    }

    // Initialize charts and load data
    initCharts();
    load();

    // SSE real-time updates with polling fallback
    if (typeof EventSource !== 'undefined') {
      const evtSource = new EventSource(API + '/dashboard/stream');
      let debounceTimer;
      evtSource.onmessage = () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(load, 300);
      };
      evtSource.onerror = () => {
        evtSource.close();
        setInterval(load, 5000);
      };
    } else {
      setInterval(load, 5000);
    }
  </script>
</body>
</html>
