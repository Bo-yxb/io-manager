spring:
  application:
    name: io-manager
  datasource:
    url: jdbc:h2:mem:iomanager;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8080
